version: '3.8'

services:

  backend:
    build: .
    container_name: smartbooking-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: smartbooking-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartbooking
    ports:
      - "3306:3306"